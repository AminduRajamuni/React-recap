<!DOCTYPE html>
<html>

<body>

    //declarative way of doing things with React
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/jsx">
        const app = document.getElementById('app');

        function Header({mekaPropEkak}){
            console.log(mekaPropEkak)
            return<h1>{mekaPropEkak}</h1>
        }

        function HomePage() {
        return <div>
            <Header mekaPropEkak='1234' />
        </div>;
        }



        const root = ReactDOM.createRoot(app);
        root.render(<HomePage/>);
    </script>








    //imperative way of doing things with the DOM
    <div id="app2"></div>
    <script type="text/javascript">

        const appi = document.getElementById('app2')

        const description = document.createElement('h2')

        const text2 = 'Hi, this is just a text h2 tag just to learn how the DOM works.'

        const desContent = document.createTextNode(text2)

        description.appendChild(desContent)

        appi.appendChild(description)

    </script>

</body>

</html>
